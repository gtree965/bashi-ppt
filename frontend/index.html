<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
    <!-- Tell Excalidraw to load its fonts from our self-hosted /fonts directory
         (copied into dist by vite.config.js) so diagram rendering works offline.
         Set here in <head> so it runs before any module bundle evaluates, rather
         than relying on ESM import ordering inside main.jsx. -->
    <script>
      window.EXCALIDRAW_ASSET_PATH = '/';
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
